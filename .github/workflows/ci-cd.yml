name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 mypy
    
    - name: Check formatting with Black
      run: black --check backend/ tests/
    
    - name: Lint with Flake8
      run: |
        flake8 backend/ tests/ --max-line-length=120 --extend-ignore=E203,W503
    
    - name: Type check with MyPy
      run: mypy backend/app/ --ignore-missing-imports
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx
    
    - name: Run migrations
      env:
        DATABASE_URL: postgresql+asyncpg://crm:crm@localhost:5432/crm_db
      run: |
        cd backend
        alembic upgrade head
    
    - name: Seed knowledge base
      env:
        DATABASE_URL: postgresql+asyncpg://crm:crm@localhost:5432/crm_db
        REDIS_URL: redis://localhost:6379
      run: |
        cd backend
        python scripts/seed_knowledge_base.py
    
    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql+asyncpg://crm:crm@localhost:5432/crm_db
        REDIS_URL: redis://localhost:6379
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        pytest tests/ -v --cov=backend/app --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
  
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build backend image
      run: |
        docker build -f Dockerfile.backend -t senai-crm-backend:${{ github.sha }} .
    
    - name: Build frontend image
      run: |
        docker build -f Dockerfile.frontend -t senai-crm-frontend:${{ github.sha }} ./frontend
    
    - name: Test Docker Compose
      run: |
        docker compose config
        docker compose build
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r backend/ -x tests/ -ll
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check || true
  
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy notification
      run: |
        echo "🚀 Deployment would happen here"
        echo "Configure your deployment strategy (e.g., AWS, GCP, Azure, Vercel)"
    
